name: Site Heartbeat

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Check site
        id: check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://taranprets21.github.io/I-doc-by-techie-sardaarji/")
          echo "status=$status" >> $GITHUB_OUTPUT

      - name: Create issue on failure
        if: steps.check.outputs.status != '200'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = `${{ steps.check.outputs.status }}`;
            const title = `Site down: I-doc heartbeat detected ${status}`;
            const body = `Automated heartbeat detected non-200 response: ${status}\n\nURL: https://taranprets21.github.io/I-doc-by-techie-sardaarji/`;
            await github.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
